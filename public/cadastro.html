<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - RAZOR Team</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/222-GKtyNvT90SRGeOg1lwQUpSvoTmtwaH.png" alt="RAZOR Logo">
                <span class="logo-text">RAZOR TEAM</span>
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="players.html">Players</a></li>
                    <li><a href="feed.html">Feed</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <button class="mobile-menu-btn" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Signup Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="https://i.imgur.com/SmkrFYr.png" alt="RAZOR Logo" class="auth-logo">
                    <h1 class="auth-title">Criar Conta</h1>
                    <p class="auth-subtitle">Junte-se à comunidade RAZOR</p>
                </div>
                
                <form id="signup-form" class="auth-form">
                    <div class="form-group">
                        <label for="nickname">Nickname</label>
                        <input type="text" id="nickname" name="nickname" required placeholder="Seu nickname no jogo" minlength="3" maxlength="20">
                        <span class="input-hint">3-20 caracteres, será seu nome público</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirmar Senha</label>
                        <input type="password" id="confirm-password" name="confirm-password" required placeholder="Repita sua senha">
                    </div>
                    
                    <div id="error-message" class="error-message" style="display: none;"></div>
                    <div id="success-message" class="success-message" style="display: none;"></div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <span class="btn-text">Criar Conta</span>
                        <span class="btn-loading" style="display: none;">
                            <div class="spinner-small"></div>
                        </span>
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Signup Form Handler
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const btnText = document.querySelector('.btn-text');
            const btnLoading = document.querySelector('.btn-loading');
            
            // Validações
            if (password !== confirmPassword) {
                errorMessage.textContent = 'As senhas não coincidem.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMessage.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Show loading
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-flex';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            const result = await signUp(email, password, nickname);
            
            if (result.success) {
                successMessage.innerHTML = `
                    <strong>Conta criada com sucesso!</strong><br>
                    Verifique seu email para confirmar sua conta.
                `;
                successMessage.style.display = 'block';
                document.getElementById('signup-form').reset();
            } else {
                let errorText = result.error;
                if (errorText.includes('already registered')) {
                    errorText = 'Este email já está cadastrado.';
                }
                errorMessage.textContent = errorText;
                errorMessage.style.display = 'block';
            }
            
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
        });
        
        // Redirect if already logged in
        (async () => {
            const session = await checkSession();
            if (session) {
                window.location.href = 'feed.html';
            }
        })();
    </script>
</body>
</html>
